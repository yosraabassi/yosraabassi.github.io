<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="images/haccp.jpg" type="image/jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Sécurité Alimentaire - Page de Grade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            margin-right: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            padding: 8px;
            margin-bottom: 16px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        img {
            max-width: 100%;
            height: auto;
            max-height: 200px;
            margin-top: 20px;
        }

        footer {
            margin-top: auto;
            padding-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue sur le Site de Sécurité Alimentaire</h1>
        <form id="loginForm">
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="password" required>

            <button type="button" onclick="login()">Connexion</button>
        </form>

        <p id="errorMessage"></p>
    </div>

    <img src="images/haccp.jpg" alt="Image Sécurité Alimentaire">

    <footer>
        <p>&copy; 2023 Sécurité Alimentaire. Tous droits réservés. | <a href="privacy.html">Politique de confidentialité</a> | <a href="contact.html">Contact</a></p>
    </footer>

    <script>
        // Liste des utilisateurs et mots de passe (à des fins d'illustration seulement)
        const users = [
            { username: "yosra", password: "123" },
            { username: "utilisateur2", password: "motdepasse2" },
            // Ajoutez d'autres utilisateurs au besoin
        ];

        function login() {
            // Récupérer les valeurs de l'identifiant et du mot de passe
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Vérifier si l'identifiant et le mot de passe sont corrects
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                // Rediriger vers la page souhaitée après la connexion réussie
                window.location.href = "data.html";
            } else {
                // Afficher un message d'erreur
                document.getElementById("errorMessage").innerHTML = "Nom d'utilisateur ou mot de passe incorrect.";
            }
        }
    </script>
</body>
</html>

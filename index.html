<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="images/images.jpg" type="image/jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Login Page</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            margin-bottom: 8px;
        }

        input {
            padding: 8px;
            margin-bottom: 16px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="button" onclick="login()">Login</button>
        </form>

        <p id="errorMessage"></p>
    </div>

    <script>
        // Liste des utilisateurs et mots de passe (à des fins d'illustration seulement)
        const users = [
            { username: "yosra", password: "123" },
            { username: "utilisateur2", password: "motdepasse2" },
            // Ajoutez d'autres utilisateurs au besoin
        ];

        function login() {
            // Récupérer les valeurs de l'identifiant et du mot de passe
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Vérifier si l'identifiant et le mot de passe sont corrects
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                // Rediriger vers la page souhaitée après la connexion réussie
                window.location.href = "login.html";
            } else {
                // Afficher un message d'erreur
                document.getElementById("errorMessage").innerHTML = "Identifiant ou mot de passe incorrect.";
            }
        }
    </script>
</body>
</html>
